name: Test MSSQL

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test_mssql:
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        container_name: mssql-express
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "MSSQL.test_pass"  
          MSSQL_PID: "Express"
          MSSQL_DATABASE: dbmerge
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P MSSQL.test_pass -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 1433:1433

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install DB system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libmariadb-dev libpq-dev
          # Install Microsoft ODBC driver for SQL Server
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          sudo add-apt-repository "$(curl https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod)"
          sudo apt-get update
          sudo apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install dependencies
        run: |
          uv sync --extra dev

      - name: Create data directory
        run: mkdir -p data

      - name: Initialize sample data
        run: |
          uv run python tests/sample_data_in_sqlite.py

      - name: Run pytest (MSSQL only)
        run: |
          uv run pytest tests/test_all.py -v --tb=short -k "mssql"
