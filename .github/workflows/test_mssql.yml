name: Test MSSQL

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test_mssql:
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "MSSQL.test_pass"
          MSSQL_PID: "Express"
        ports:
          - 1433:1433

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install DB system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libmariadb-dev libpq-dev
          # Install Microsoft ODBC driver for SQL Server
          curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor | sudo tee /usr/share/keyrings/microsoft-prod.gpg > /dev/null
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/24.04/prod noble main" | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=1 apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install dependencies
        run: |
          uv sync --extra dev

      - name: Create data directory
        run: mkdir -p data

      - name: Initialize sample data
        run: |
          uv run python tests/sample_data_in_sqlite.py

      - name: Wait for SQL Server
        run: sleep 30

      - name: Run pytest (MSSQL only)
        run: |
          uv run pytest tests/test_all.py -v --tb=short -k "mssql"
