services:
  ydb:
    image: ydbplatform/local-ydb:latest
    container_name: ydb-local
    hostname: localhost
    ports:
      - "2135:2135"  # gRPC with TLS
      - "2136:2136"  # gRPC (Standard)
      - "8765:8765"  # Web UI (Monitoring)
    environment:
      - YDB_ANONYMOUS_CREDENTIALS=true
      - YDB_USE_IN_MEMORY_PDISKS=true
    volumes:
      - ./ydb_certs:/ydb_certs
      - ./ydb_data:/ydb_data

